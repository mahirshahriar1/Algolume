<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved (or system-preferred) theme before first paint to
      // avoid a flash of the wrong theme.
      (function () {
        try {
          // Default to light mode; only go dark if explicitly saved.
          var stored = localStorage.getItem("algolume-theme");
          document.documentElement.classList.toggle("dark", stored === "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Algolume — Learn Algorithms, Illuminated</title>
    <meta name="description" content="One place to learn algorithms: read it like a book, watch it run, play with it, take notes, and solve problems — all in the browser." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
